trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  modulePath: 'projet1-main'

steps:
- checkout: self

- task: Maven@4
  displayName: 'Build Spring Boot project'
  inputs:
    mavenPomFile: '$(modulePath)/pom.xml'
    goals: 'clean package'
    options: '-DskipTests'
    javaHomeOption: 'JDKVersion'
    jdkVersionOption: '1.8'
    mavenVersionOption: 'Default'

- script: |
    docker build -t projet1:$(Build.BuildId) $(modulePath)
  displayName: 'Build Docker image'

- script: |
    echo "CI completed successfully"
    echo "Image built: projet1:$(Build.BuildId)"
  displayName: 'Summary'

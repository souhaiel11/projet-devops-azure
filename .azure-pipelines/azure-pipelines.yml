trigger:
  branches:
    include:
      - main

pool:
  name: 'Default'

variables:
  modulePath: 'projet1-main'

steps:
- checkout: self

- script: |
    cd $(modulePath)
    mvn clean package -DskipTests
  displayName: 'Build Spring Boot project'

- script: |
    docker build -t projet1:$(Build.BuildId) $(modulePath)
  displayName: 'Build Docker image'

- script: |
    echo "CI completed successfully"
    echo "Image built: projet1:$(Build.BuildId)"
  displayName: 'Summary'
